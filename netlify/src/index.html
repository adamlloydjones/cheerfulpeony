<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pinterest Scheduler (Netlify)</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; }
    input, button, select, textarea { margin: 0.25rem 0; width: 100%; }
    .row { margin-bottom: 1rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { border: 1px solid #ddd; padding: 0.5rem; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>Pinterest Scheduler</h1>

  <div class="row">
    <button onclick="connectPinterest()">Connect Pinterest</button>
    <p id="status"></p>
  </div>

  <div class="row">
    <h2>Create scheduled post</h2>
    <label>
      Pinterest User ID
      <input id="pinterest_user_id" placeholder="Pinterest user id (from your account)" />
    </label>
    <label>
      Board ID
      <input id="board_id" placeholder="Board ID" />
    </label>
    <label>
      Image URL
      <input id="media_url" placeholder="https://..." />
    </label>
    <label>
      Title
      <input id="title" />
    </label>
    <label>
      Description
      <textarea id="description"></textarea>
    </label>
    <label>
      Scheduled at (ISO, e.g. 2026-05-01T10:00:00Z)
      <input id="scheduled_at" />
    </label>
    <button onclick="createScheduledPost()">Schedule</button>
  </div>

  <div class="row">
    <h2>Scheduled posts</h2>
    <button onclick="loadPosts()">Refresh list</button>
    <table id="posts-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Board</th>
          <th>Media</th>
          <th>Scheduled</th>
          <th>Status</th>
          <th>Pin ID</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    function connectPinterest() {
      window.location.href = '/.netlify/functions/pinterest-auth-start';
    }

    async function createScheduledPost() {
      const pinterest_user_id = document.getElementById('pinterest_user_id').value.trim();
      const board_id = document.getElementById('board_id').value.trim();
      const media_url = document.getElementById('media_url').value.trim();
      const title = document.getElementById('title').value.trim();
      const description = document.getElementById('description').value.trim();
      const scheduled_at = document.getElementById('scheduled_at').value.trim();

      const res = await fetch('/.netlify/functions/create-scheduled-post', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          pinterest_user_id,
          board_id,
          media_url,
          title,
          description,
          scheduled_at
        })
      });

      const json = await res.json();
      document.getElementById('status').textContent = JSON.stringify(json, null, 2);
      loadPosts();
    }

    async function loadPosts() {
      const pinterest_user_id = document.getElementById('pinterest_user_id').value.trim();
      if (!pinterest_user_id) {
        alert('Enter Pinterest user id first');
        return;
      }

      const res = await fetch(
        '/.netlify/functions/list-scheduled-posts?pinterest_user_id=' + encodeURIComponent(pinterest_user_id)
      );
      const json = await res.json();
      const tbody = document.querySelector('#posts-table tbody');
      tbody.innerHTML = '';

      (json.posts || []).forEach(p => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${p.id}</td>
          <td>${p.board_id}</td>
          <td><a href="${p.media_url}" target="_blank">image</a></td>
          <td>${p.scheduled_at}</td>
          <td>${p.status}</td>
          <td>${p.pinterest_pin_id || ''}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    // Show connection status from query param
    const params = new URLSearchParams(window.location.search);
    if (params.get('connected') === 'pinterest') {
      document.getElementById('status').textContent = 'Pinterest connected!';
    }
  </script>
</body>
</html>
